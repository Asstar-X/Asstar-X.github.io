    <style>
        body { background: #050505 !important; }

        /* Hero 3D Container Styles */
        #hero-3d-container {
            width: 100%;
            height: 100%;
            min-height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hero-3d-container canvas { display: block; }

        .hero-3d-hint {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-display, 'Orbitron', sans-serif);
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            opacity: 0;
            white-space: nowrap;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .hero-3d-hint.show { opacity: 1; }
        .hero-3d-hint.hide { opacity: 0; transition: opacity 1s ease; }
        .hero-3d-hint.blinking-cursor::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.8);
            margin-left: 6px;
            vertical-align: text-bottom;
            animation: blinkCursor 0.75s infinite;
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Override back button for index since we are at home */
        .back-button { display: none !important; }
    </style>

    <script>
        loadProjects('galactic-timeline');

        // Initialize sprite chat
        document.addEventListener('DOMContentLoaded', () => {
            if (window.SpriteChatManager) {
                window.spriteChatManager = new window.SpriteChatManager();
            }
        });

        // --- Hero "Voice" 3D Particle Sphere ---
        (function() {
            const heroContainer = document.getElementById('hero-3d-container');
            if (!heroContainer) return;

            const containerWidth = heroContainer.offsetWidth || 500;
            const containerHeight = heroContainer.offsetHeight || 500;

            const heroScene = new THREE.Scene();
            heroScene.fog = new THREE.FogExp2(0x050505, 0.015);

            const heroCamera = new THREE.PerspectiveCamera(75, containerWidth / containerHeight, 0.1, 1000);
            heroCamera.position.z = 25;

            const heroRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            heroRenderer.setSize(containerWidth, containerHeight);
            heroRenderer.setPixelRatio(window.devicePixelRatio);
            heroContainer.appendChild(heroRenderer.domElement);

            const sphereGeometry = new THREE.SphereGeometry(8, 128, 128);
            const sphereMaterial = new THREE.PointsMaterial({
                size: 0.1,
                color: 0xffffff,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                vertexColors: true
            });

            const count = sphereGeometry.attributes.position.count;
            const colors = [];
            for (let i = 0; i < count; i++) {
                const mixedColor = new THREE.Color();
                const ratio = Math.random();
                if (ratio < 0.4) mixedColor.setHex(0x0a0a2a).lerp(new THREE.Color(0x8a2be2), ratio / 0.4);
                else if (ratio < 0.8) mixedColor.setHex(0x8a2be2).lerp(new THREE.Color(0x00d2ff), (ratio - 0.4) / 0.4);
                else mixedColor.setHex(0x00d2ff).lerp(new THREE.Color(0xffffff), (ratio - 0.8) / 0.2);
                colors.push(mixedColor.r, mixedColor.g, mixedColor.b);
            }
            sphereGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const particleSphere = new THREE.Points(sphereGeometry, sphereMaterial);
            heroScene.add(particleSphere);

            const awakePositions = new Float32Array(count * 3);
            const sigma = 3.0, heightScale = 14.0, bellRadius = 12.0;
            for (let i = 0; i < count; i++) {
                const r = bellRadius * Math.sqrt(Math.random()), theta = Math.random() * Math.PI * 2;
                const ax = r * Math.cos(theta), az = r * Math.sin(theta);
                let ay = heightScale * Math.exp(-(ax*ax + az*az) / (2 * sigma * sigma)) - (heightScale / 2.5);
                ay += (Math.random() - 0.5) * 0.3;
                awakePositions[i * 3] = ax; awakePositions[i * 3 + 1] = ay; awakePositions[i * 3 + 2] = az;
            }
            const originalPositions = sphereGeometry.attributes.position.array.slice();

            heroScene.add(new THREE.AmbientLight(0x404040, 2));
            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(10, 10, 10);
            heroScene.add(pointLight);

            let heroMouseX = 0, heroMouseY = 0, heroTime = 0, amplitude = 0.9, speed = 1.0, isHeroHovered = false, pulseObj = { scale: 0, progress: 0 }, isAwake = false;
            const hintEl = document.createElement('div');
            hintEl.className = 'hero-3d-hint';
            heroContainer.appendChild(hintEl);
            let hintText = "[ CLICK TO AWAKE ]", hintTimeout, typeInterval;

            heroContainer.addEventListener('mouseenter', () => {
                isHeroHovered = true;
                hintEl.classList.remove('hide'); hintEl.classList.add('show', 'blinking-cursor');
                hintEl.innerText = "";
                let charIndex = 0;
                clearInterval(typeInterval);
                typeInterval = setInterval(() => {
                    if (charIndex < hintText.length) { hintEl.innerText += hintText[charIndex]; charIndex++; }
                    else { clearInterval(typeInterval); clearTimeout(hintTimeout); hintTimeout = setTimeout(() => { hintEl.classList.remove('show', 'blinking-cursor'); hintEl.classList.add('hide'); }, 3000); }
                }, 40);
            });
            heroContainer.addEventListener('mouseleave', () => { isHeroHovered = false; heroMouseX = 0; heroMouseY = 0; clearInterval(typeInterval); hintEl.classList.remove('show', 'blinking-cursor'); hintEl.classList.add('hide'); });
            heroContainer.addEventListener('mousemove', (event) => { const rect = heroContainer.getBoundingClientRect(); heroMouseX = ((event.clientX - rect.left) / rect.width - 0.5) * 2; heroMouseY = ((event.clientY - rect.top) / rect.height - 0.5) * 2; });
            setInterval(() => { if (!isHeroHovered && !isAwake) gsap.to(pulseObj, { scale: 0.12, duration: 1.5, yoyo: true, repeat: 1, ease: "sine.inOut" }); }, 8000);
            heroContainer.addEventListener('click', () => {
                isAwake = !isAwake;
                hintText = isAwake ? "[ STATUS: AWAKENED ]" : "[ CLICK TO AWAKE ]";
                if (hintEl.classList.contains('show')) hintEl.innerText = hintText;
                gsap.to(pulseObj, { progress: isAwake ? 1 : 0, duration: 2.5, ease: "power3.inOut" });
                gsap.to(particleSphere.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" });
            });

            function animateHeroSphere() {
                requestAnimationFrame(animateHeroSphere);
                heroTime += 0.01 * speed;
                const positions = sphereGeometry.attributes.position.array;
                const p = pulseObj.progress;
                for (let i = 0; i < count; i++) {
                    const px = originalPositions[i * 3], py = originalPositions[i * 3 + 1], pz = originalPositions[i * 3 + 2];
                    const noise = Math.sin(px * 0.5 + heroTime) * Math.cos(py * 0.3 + heroTime) * Math.sin(pz * 0.5 + heroTime);
                    const displacement = 1 + (noise * 0.18 * amplitude);
                    const chaosX = px * displacement, chaosY = py * displacement, chaosZ = pz * displacement;
                    if (p > 0) {
                        const ax = awakePositions[i * 3], ay = awakePositions[i * 3 + 1], az = awakePositions[i * 3 + 2];
                        const orderRotation = heroTime * 0.3, cosR = Math.cos(orderRotation), sinR = Math.sin(orderRotation);
                        const finalAx = ax * cosR - az * sinR, finalAz = ax * sinR + az * cosR;
                        positions[i * 3] = chaosX + (finalAx - chaosX) * p; positions[i * 3 + 1] = chaosY + (ay - chaosY) * p; positions[i * 3 + 2] = chaosZ + (finalAz - chaosZ) * p;
                    } else { positions[i * 3] = chaosX; positions[i * 3 + 1] = chaosY; positions[i * 3 + 2] = chaosZ; }
                }
                sphereGeometry.attributes.position.needsUpdate = true;
                const targetPosX = heroMouseX * 1.2, targetPosY = -heroMouseY * 1.2;
                particleSphere.position.x += 0.08 * (targetPosX - particleSphere.position.x); particleSphere.position.y += 0.08 * (targetPosY - particleSphere.position.y);
                const distToCenter = Math.sqrt(heroMouseX * heroMouseX + heroMouseY * heroMouseY);
                const targetScale = 1 + distToCenter * 0.15 + pulseObj.scale;
                particleSphere.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
                particleSphere.rotation.y += 0.003; particleSphere.rotation.x += 0.05 * (heroMouseY * 0.4 - particleSphere.rotation.x); particleSphere.rotation.z += 0.05 * (heroMouseX * 0.2 - particleSphere.rotation.z);
                heroRenderer.render(heroScene, heroCamera);
            }
            animateHeroSphere();
            const resizeObserver = new ResizeObserver(() => { const newWidth = heroContainer.offsetWidth, newHeight = heroContainer.offsetHeight; heroCamera.aspect = newWidth / newHeight; heroCamera.updateProjectionMatrix(); heroRenderer.setSize(newWidth, newHeight); });
            resizeObserver.observe(heroContainer);
        })();
    </script>
