<!DOCTYPE html>
<html lang="zh-CN">

<body>
    <!-- Components injected by js/components.js -->
    <script src="js/components.js"></script>

    <!-- 导航栏 -->
    <header class="header">
        <nav class="nav">
            <a href="space.html" class="logo" title="点击进入探索">
                <img src="assets/images/Asstar.jpg" alt="Logo" class="logo-img">
            </a>
            <div class="menu">
                <a href="nova.html" class="nav-link">Nova</a>
                <a href="atlas.html" class="nav-link">Atlas</a>
                <a href="voice-interaction.html" class="nav-link">Interest</a>
                <a href="orbit.html" class="nav-link">Orbit</a>
            </div>
            <button class="nav-expand-btn" id="nav-expand-btn" title="查看标本归档">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </nav>
    </header>

    <main id="time-rift-main">
        <!-- 英雄区域 -->
        <section id="home" class="hero rift-section">
            <div class="hero-immersive-center hero-split-layout">
                <!-- 左侧文案展示 -->
                <div class="hero-text-side">
                    <h1 class="hero-merged-title">探索未知的边界</h1>
                    <div class="text-divider"></div>
                    <div class="hero-merged-desc">
                        <p class="desc-line">让思维在尚未抵达之处 先完成自我抵达</p>
                        <p class="desc-line">让未知在尚未发生之前 先被体验</p>
                    </div>
                </div>

                <!-- 居中无边框 9:16 视频容器 -->
                <div class="immersive-video-container" id="video-specimen">
                    <!-- 柔和背光阴影 (Glowing Backlight) -->
                    <div class="glow-backlight"></div>

                    <!-- 视频本体 -->
                    <div class="immersive-video-wrapper">
                        <video class="hero-video" autoplay muted loop playsinline preload="metadata">
                            <source src="assets/Asstar.mp4" type="video/mp4">
                        </video>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Alien Specimen Overlay Modal -->
    <div class="alien-overlay" id="alien-overlay">
        <!-- Close Button -->
        <button class="alien-close-btn" id="alien-close-btn" aria-label="关闭">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>



        <!-- 3D Coverflow Slider Wrapper -->
        <div class="alien-slider-wrapper">
            <div class="alien-slider-stage" id="alien-slider-stage">
                <!-- Cards will be dynamically generated by Javascript -->
            </div>
        </div>

        <!-- Navigation Controls -->
        <div class="alien-controls">
            <button class="alien-nav-arrow prev" id="alien-prev-btn" aria-label="上一个">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </button>
            <div class="alien-pagination" id="alien-pagination">
                <!-- Dots will be dynamically generated by JS -->
            </div>
            <button class="alien-nav-arrow next" id="alien-next-btn" aria-label="下一个">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="js/script.js" defer></script>
    <script src="js/time-rift.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Centered Video 3D Tilt Effect ---
            (function() {
                const videoCapsule = document.getElementById('video-specimen');
                if (!videoCapsule) return;

                let rect = null;

                videoCapsule.addEventListener('mouseenter', () => {
                    rect = videoCapsule.getBoundingClientRect();
                });

                videoCapsule.addEventListener('mousemove', (event) => {
                    if (!rect) rect = videoCapsule.getBoundingClientRect();
                    const mouseX = ((event.clientX - rect.left) / rect.width - 0.5) * 2;
                    const mouseY = ((event.clientY - rect.top) / rect.height - 0.5) * 2;
                    const tiltX = -mouseY * 8; // Max 8 degrees tilt
                    const tiltY = mouseX * 8;
                    videoCapsule.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`;
                });

                videoCapsule.addEventListener('mouseleave', () => {
                    rect = null;
                    videoCapsule.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
                });
            })();

            // --- Alien Specimens 3D Coverflow Carousel ---
            (function() {
                const specimens = Array.from({ length: 25 });

                const stage = document.getElementById('alien-slider-stage');
                const pagination = document.getElementById('alien-pagination');
                const overlay = document.getElementById('alien-overlay');
                const expandBtn = document.getElementById('nav-expand-btn');
                const closeBtn = document.getElementById('alien-close-btn');
                const prevBtn = document.getElementById('alien-prev-btn');
                const nextBtn = document.getElementById('alien-next-btn');

                if (!stage || !overlay || !expandBtn) return;

                let activeIndex = 1; // start with 2nd card active
                let dragMoved = false;

                // Generate Card DOM
                specimens.forEach((specimen, i) => {
                    const card = document.createElement('div');
                    card.className = 'alien-card';
                    card.innerHTML = `
                        <img src="assets/images/Alien${i + 1}.jpg" alt="Alien specimen" class="card-bg-img" loading="lazy">
                        <div class="card-scan-line"></div>
                    `;

                    stage.appendChild(card);

                    // Pagination dot
                    const dot = document.createElement('div');
                    dot.className = 'alien-dot';
                    dot.addEventListener('click', () => {
                        activeIndex = i;
                        updateCoverflow();
                    });
                    pagination.appendChild(dot);
                });

                const cards = stage.querySelectorAll('.alien-card');
                const dots = pagination.querySelectorAll('.alien-dot');

                // Click side card to switch (using event delegation with drag detection)
                stage.addEventListener('click', (e) => {
                    if (dragMoved) {
                        dragMoved = false;
                        return;
                    }
                    const card = e.target.closest('.alien-card');
                    if (card) {
                        const index = Array.from(cards).indexOf(card);
                        if (index !== -1 && index !== activeIndex) {
                            e.stopPropagation();
                            activeIndex = index;
                            updateCoverflow();
                        }
                    }
                });

                function updateCoverflow() {
                    cards.forEach((card, i) => {
                        const diff = i - activeIndex;
                        const absDiff = Math.abs(diff);

                        // Layout calculation
                        const isMobile = window.innerWidth <= 768;
                        const baseSpacing = isMobile ? 80 : 130;
                        const activeOffset = isMobile ? 90 : 150;

                        let tx = diff * baseSpacing;
                        if (diff > 0) tx += activeOffset;
                        else if (diff < 0) tx -= activeOffset;

                        const tz = absDiff * -130; // depth position
                        const scale = absDiff === 0 ? 1.05 : 0.85; // active scale
                        const ry = diff < 0 ? 25 : (diff > 0 ? -25 : 0); // Y rotation
                        const opacity = Math.max(1 - absDiff * 0.15, 0); // fade out distant
                        const zIndex = 100 - absDiff; // active card on top

                        card.style.transform = `translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
                        card.style.opacity = opacity;
                        card.style.zIndex = zIndex;
                        card.style.pointerEvents = 'auto'; // allow clicking all cards

                        if (absDiff === 0) {
                            card.classList.add('active-center');
                        } else {
                            card.classList.remove('active-center');
                        }
                    });

                    // Update dots
                    dots.forEach((dot, i) => {
                        if (i === activeIndex) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                }

                // Expand Overlay Trigger
                expandBtn.addEventListener('click', () => {
                    overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                    updateCoverflow();
                });

                // Close Overlay
                function closeOverlay() {
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }

                closeBtn.addEventListener('click', closeOverlay);

                // Click backdrop to close
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay || e.target.classList.contains('alien-slider-wrapper')) {
                        closeOverlay();
                    }
                });

                // Navigation Controls
                prevBtn.addEventListener('click', () => {
                    if (activeIndex > 0) {
                        activeIndex--;
                        updateCoverflow();
                    }
                });

                nextBtn.addEventListener('click', () => {
                    if (activeIndex < specimens.length - 1) {
                        activeIndex++;
                        updateCoverflow();
                    }
                });

                // Keyboard controls
                window.addEventListener('keydown', (e) => {
                    if (!overlay.classList.contains('active')) return;
                    if (e.key === 'ArrowLeft') {
                        if (activeIndex > 0) { activeIndex--; updateCoverflow(); }
                    } else if (e.key === 'ArrowRight') {
                        if (activeIndex < specimens.length - 1) { activeIndex++; updateCoverflow(); }
                    } else if (e.key === 'Escape') {
                        closeOverlay();
                    }
                });

                // Swipe/Drag gesture support
                let startX = 0;
                let isDragging = false;

                stage.addEventListener('mousedown', (e) => {
                    startX = e.clientX;
                    isDragging = true;
                    dragMoved = false;
                });

                stage.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    const diffX = e.clientX - startX;
                    if (Math.abs(diffX) > 10) {
                        dragMoved = true;
                    }
                    if (Math.abs(diffX) > 60) {
                        if (diffX > 0) {
                            if (activeIndex > 0) { activeIndex--; updateCoverflow(); }
                        } else {
                            if (activeIndex < specimens.length - 1) { activeIndex++; updateCoverflow(); }
                        }
                        startX = e.clientX;
                        isDragging = false;
                    }
                });

                window.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                // Mobile touch swipe gesture
                stage.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    dragMoved = false;
                }, { passive: true });

                stage.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    const diffX = e.touches[0].clientX - startX;
                    if (Math.abs(diffX) > 10) {
                        dragMoved = true;
                    }
                    if (Math.abs(diffX) > 50) {
                        if (diffX > 0) {
                            if (activeIndex > 0) { activeIndex--; updateCoverflow(); }
                        } else {
                            if (activeIndex < specimens.length - 1) { activeIndex++; updateCoverflow(); }
                        }
                        startX = e.touches[0].clientX;
                        isDragging = false;
                    }
                }, { passive: true });

                stage.addEventListener('touchend', () => {
                    isDragging = false;
                });

                // Handle window resize dynamically
                window.addEventListener('resize', () => {
                    if (overlay.classList.contains('active')) {
                        updateCoverflow();
                    }
                });

            })();
        });
</script>
</body>

</html>
