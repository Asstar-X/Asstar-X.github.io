<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Shared Utils & Components -->
    <script src="js/utils.js"></script>
    <script>window.initGA();</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9033198011792089"
         crossorigin="anonymous"></script>
    
    <title>Nova - Asstar</title>
    <link rel="icon" type="image/jpeg" href="assets/images/Asstar.jpg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/common.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&family=PingFang+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js" defer></script>
    <!-- Sprite Chat Styles -->
    <link rel="stylesheet" href="css/sprite-chat.css">
    
    <style>

        /* Nova specific card style overrides */
        .repo-description, .model-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .repo-stats, .model-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-item i {
            color: #ffffff;
        }

        .repo-languages, .model-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .language-tag, .tag {
            padding: 4px 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ffffff;
        }

        .paper-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        .paper-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        .paper-abstract {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
    </style>
</head>

<body class="reading-mode">
    <!-- Components injected by js/components.js -->
    <script src="js/components.js"></script>



    <main>
        <section class="trending-container">
            <div class="container">
                <div class="trending-header">
                    
                    <!-- Primary Category Tab -->
                    <div class="source-tabs" id="nova-primary-tabs" style="margin-bottom: 32px;">
                        <button class="source-tab" data-tab="projects">前沿项目</button>
                        <button class="source-tab" data-tab="papers">前沿论文</button>
                        <button class="source-tab" data-tab="focus">焦点新闻</button>
                    </div>

                    <!-- Dynamic Controls and Filters -->
                    <div id="nova-secondary-controls">
                        <!-- Sub filters are dynamically injected depending on active tab -->
                    </div>

                    <p class="trending-subtitle" id="last-updated" style="margin-top: 16px; margin-bottom: 12px;">数据同步中...</p>
                </div>

                <!-- Card Grid Content -->
                <div id="nova-content">
                    <!-- Cards will be dynamically injected by JS -->
                </div>
            </div>
        </section>
    </main>

    <div id="sprite-container" data-context="nova"></div>
    <script src="js/script.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/sprite-chat.js" defer></script>
    <script src="js/nova.js" defer></script>
</body>

</html>
